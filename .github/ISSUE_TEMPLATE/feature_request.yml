name: Feature Request
description: Suggest a feature for SIDJUA
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: "What problem does this solve?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: "How should this work?"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Governance Engine
        - CLI
        - REST API
        - Provider System
        - Knowledge Pipeline
        - Docker / Deployment
        - Documentation
        - Other
