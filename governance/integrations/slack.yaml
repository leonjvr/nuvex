name: slack
type: deterministic
protocol: rest
base_url: "https://slack.com/api"
auth:
  type: bearer
  secret_ref: "slack-bot-token"
actions:
  post_message:
    method: POST
    path: "/chat.postMessage"
    params:
      channel:
        type: string
        required: true
      text:
        type: string
        required: true
      thread_ts:
        type: string
        required: false
    governance:
      require_approval: false
      budget_per_call: 0.00
      rate_limit: "30/minute"
      risk_level: medium
  list_channels:
    method: GET
    path: "/conversations.list"
    governance:
      require_approval: false
      budget_per_call: 0.00
      rate_limit: "10/minute"
      risk_level: low
  upload_file:
    method: POST
    path: "/files.upload"
    params:
      channels:
        type: string
        required: true
      content:
        type: string
        required: true
      filename:
        type: string
        required: true
    governance:
      require_approval: true
      budget_per_call: 0.00
      rate_limit: "5/minute"
      risk_level: medium
enabled: true
