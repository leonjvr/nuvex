# ---------------------------------------------------------------------------
# Sandbox configuration (Phase 19)
# Set provider: "bubblewrap" to enable OS-level process isolation.
# Run `sidjua sandbox check` to verify dependencies.
# ---------------------------------------------------------------------------
sandbox:
  provider: "none"      # "none" (default, no isolation) | "bubblewrap" (Linux/macOS)
  defaults:
    network:
      allowedDomains: []  # domains agents are allowed to reach (empty = all allowed)
      deniedDomains:  []  # domains agents are blocked from (empty = none blocked)
    filesystem:
      denyRead:           # paths agents cannot read
        - "~/.ssh"
        - "~/.gnupg"
        - "/etc/shadow"
      allowWrite: []      # additional paths agents may write to (workdir is always writable)
      denyWrite:  []      # paths agents cannot write to
