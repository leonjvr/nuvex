  skills: []
whatsapp:
  enabled: true
  agent_id: maya
  dm_policy: pairing
  group_policy: allowlist
  humanise_enabled: true
  humanise_read_receipt_delay_ms: 1500
  humanise_thinking_delay_ms: 2500
  humanise_typing_speed_wpm: 45
  humanise_chunk_messages: true
database:
  url: null
health:
  gateway_check_interval_seconds: 30
# Parallel tool execution (hermes-inspired-runtime §1)
tools:
  parallel:
    enabled: true
    max_concurrency: 8
    safe_tools:
      - read_file
      - web_fetch
      - web_search
      - session_search
      - read_tool_result
      - memory_retrieve
  result_budget:
    enabled: true
    default_max_chars: 30000
    turn_budget_chars: 200000
    per_tool:
      shell: 50000
      web_fetch: 20000
# Multi-credential failover pool (hermes-inspired-runtime §3)
# Add keys as env var references: ${ANTHROPIC_API_KEY_1}
llm:
  credential_pools:
    providers: {}
