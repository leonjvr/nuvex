# SIDJUA Orchestrator Configuration
# Auto-generated by sidjua apply — customize as needed.
#
# This file controls how the SIDJUA orchestrator schedules and runs tasks.
# All values are optional — sensible defaults are used when absent.
#
# mode: single | distributed
#   single      — one orchestrator process (default, suitable for most deployments)
#   distributed — reserved for future cluster mode
#
# poll_interval: how often (ms) the orchestrator polls for new tasks (default: 500)
# max_concurrent: maximum simultaneously RUNNING tasks across all agents (default: 10)
# task_timeout: maximum task runtime in seconds before forced cancellation (default: 300)
# api_port: HTTP port for the REST API and GUI (default: 3000)
#
# Advanced (optional):
#   max_agents: hard cap on simultaneously active agents (default: 20)
#   delegation_timeout_ms: max ms for a delegation round-trip (default: 30000)
#   synthesis_timeout_ms: max ms to wait for child-task synthesis (default: 60000)
#   max_tree_depth: maximum task delegation depth (default: 3)
#   max_tree_breadth: maximum parallel child tasks (default: 8)
#   default_division: fallback division when agent has none set (default: general)

max_agents: 10
event_poll_interval_ms: 500
delegation_timeout_ms: 120000
synthesis_timeout_ms: 60000
max_tree_depth: 5
max_tree_breadth: 10
default_division: default
governance_root: governance
api_port: 3000
