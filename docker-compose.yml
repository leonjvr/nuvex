# SIDJUA — AI Governance Platform
# https://sidjua.com | AGPL-3.0-only
#
# Quick Start:
#   docker compose up -d
#   docker compose exec sidjua sidjua api-key generate
#   export SIDJUA_API_KEY=<key-from-above>
#   docker compose exec sidjua sidjua apply
#
# Semantic Search (V0.9.5+, optional):
#   docker compose --profile semantic-search up -d
#
# Documentation: https://sidjua.com/docs

services:
  sidjua:
    image: ghcr.io/goetzkohlberg/sidjua:1.0.0
    container_name: sidjua
    restart: unless-stopped
    ports:
      - "${SIDJUA_PORT:-4200}:${SIDJUA_PORT:-4200}"
    environment:
      - NODE_ENV=production
      - SIDJUA_PORT=${SIDJUA_PORT:-4200}
      - SIDJUA_DATA_DIR=/app/data
      - SIDJUA_CONFIG_DIR=/app/config
      - SIDJUA_LOG_DIR=/app/logs
      # Optional — set to enable semantic search (V0.9.5+)
      # Requires: docker compose --profile semantic-search up -d
      - SIDJUA_QDRANT_URL=${SIDJUA_QDRANT_URL:-}
      - SIDJUA_API_KEY=${SIDJUA_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # API key auto-generated on first run — check container logs: docker logs sidjua
    volumes:
      - sidjua-data:/app/data
      - sidjua-config:/app/config
      - sidjua-logs:/app/logs
      - sidjua-system:/app/.system
      - sidjua-workspace:/app/agents
      - sidjua-governance:/app/governance
    security_opt:
      - "seccomp=seccomp-profile.json"
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:'+(process.env.SIDJUA_PORT||'4200')+'/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - sidjua-net

  # ---------------------------------------------------------------------------
  # Qdrant — Vector database for semantic search (V0.9.5+, OPTIONAL)
  #
  # NOT started by default. To enable:
  #   docker compose --profile semantic-search up -d
  #
  # Once running, configure embedding in SIDJUA:
  #   sidjua config embedding cloudflare-bge   # free, uses built-in CF token
  #   sidjua config embedding ollama-nomic     # local/air-gap, needs Ollama
  # ---------------------------------------------------------------------------
  qdrant:
    profiles: ["semantic-search"]
    image: qdrant/qdrant:v1.13.2
    container_name: sidjua-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sidjua-net
    # Qdrant is NOT exposed to host by default — only reachable by sidjua service.
    # Uncomment to expose for debugging:
    # ports:
    #   - "6333:6333"
    #   - "6334:6334"

volumes:
  sidjua-data:
    name: sidjua-data
  sidjua-config:
    name: sidjua-config
  sidjua-logs:
    name: sidjua-logs
  sidjua-system:
    name: sidjua-system
  sidjua-workspace:
    name: sidjua-workspace
  sidjua-governance:
    name: sidjua-governance
  qdrant-data:
    name: sidjua-qdrant-data

networks:
  sidjua-net:
    name: sidjua-net
    driver: bridge
