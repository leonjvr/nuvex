my_rules:
  - action: contract.sign
    enforce: block
    reason: "No contract signing without me"

  - action: code.deploy
    enforce: ask_first
    reason: "Always ask before deploying"

  - action: web.fetch
    enforce: warn
    reason: "Log all external fetches"
    condition: "target contains 'external'"

budget:
  daily_limit_usd: 5.00
  monthly_limit_usd: 50.00
  alert_threshold_percent: 80

memory:
  auto_compact: true
  short_term_limit_kb: 20
  archive_to: file
  archive_path: ".archive/"
