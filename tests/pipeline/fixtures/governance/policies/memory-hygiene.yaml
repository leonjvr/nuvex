# governance/policies/memory-hygiene.yaml
#
# Memory Lifecycle Governance Policy
# Controls automated memory compaction, archival, and cleanup.
# Agents cannot bypass this — memory operations go through Pre-Action Pipeline.

schedule:
  type: cron
  expression: "0 2 * * *"      # Daily at 02:00 UTC (10:00 PHT)
  timezone: UTC
  on_demand: true               # Can also be triggered manually

thresholds:
  short_term:
    warn_kb: 10
    compact_kb: 15
    hard_limit_kb: 25
  skill_file:
    warn_kb: 6
    compact_kb: 8
    hard_limit_kb: 12
  long_term:
    max_entries: 10000
    dedup_threshold: 0.95

retention:
  always_retain:
    - open_tasks
    - active_projects
    - unresolved_decisions
    - current_session
  time_based_retain:
    decisions: 7d
    session_summaries: 3
    checkpoint_history: 10
    error_log: 72h
  never_retain:
    - completed_task_details
    - old_session_transcripts
    - resolved_blockers

archival:
  target: qdrant
  collection_prefix: "memory_archive"
  tagging:
    required:
      - source_agent_id
      - source_tier
      - archive_timestamp
      - content_type
      - original_created_at
    optional:
      - task_id
      - division_code
      - project_name
  traceability: true

compaction:
  strategy: smart
  dry_run: false

audit:
  enabled: true
  log_level: detailed

rules:
  - id: memory_hygiene_short_term_limit
    description: "Block memory writes when short-term exceeds hard limit"
    action_types: ["memory.archive", "memory.compact"]
    check: "memory_size_kb <= 25"
    enforcement: soft

  - id: memory_hygiene_skill_limit
    description: "Block skill.md writes when exceeding hard limit"
    action_types: ["memory.skill_update"]
    check: "skill_file_size_kb <= 12"
    enforcement: hard

  - id: memory_no_delete_active
    description: "Never delete memory entries referenced by open tasks"
    action_types: ["memory.delete"]
    check: "target_has_no_open_task_refs == true"
    enforcement: hard

  - id: memory_archive_requires_tag
    description: "All archival operations must include required tags"
    action_types: ["memory.archive", "memory.migrate"]
    check: "has_required_tags == true"
    enforcement: hard

  - id: memory_pool_division_scope
    description: "Pool writes only within own division"
    action_types: ["memory.pool_write"]
    check: "target_division == division_code"
    enforcement: hard

  - id: memory_cross_division_migrate
    description: "Cross-division memory migration requires approval"
    action_types: ["memory.migrate"]
    check: "target_division == division_code"
    enforcement: hard
