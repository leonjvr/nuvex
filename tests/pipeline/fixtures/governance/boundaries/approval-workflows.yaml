workflows:
  - trigger:
      action: code.deploy
    require: division_head
    timeout_hours: 24

  - trigger:
      action: email.send
      condition: "target_division != division_code"
    require: division_head
    timeout_hours: 4

  - trigger:
      action: data.export
    require: division_head
    timeout_hours: 24

  # Memory lifecycle approvals
  - trigger:
      action: memory.delete
    require: division_head
    timeout_hours: 24

  - trigger:
      action: memory.migrate
      condition: "target_division != division_code"
    require: division_head
    timeout_hours: 12

  - trigger:
      action: memory.skill_update
      condition: "changes_role_definition == true"
    require: division_head
    timeout_hours: 4
